<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ritual — currently brewing</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{
      extend:{
        colors:{
          "surface-container-high":"#2a2a2a","surface":"#131313","primary-container":"#49362f",
          "on-secondary":"#422a26","primary":"#F1DFD3","on-primary":"#3e2c26","secondary":"#F0BD8B",
          "outline-variant":"#504442","surface-variant":"#353534","background":"#131313",
          "surface-container":"#201f1f","outline":"#9c8d8a","on-surface":"#e5e2e1",
          "secondary-container":"#5b403c","on-background":"#e5e2e1","inverse-surface":"#e5e2e1",
          "on-secondary-container":"#d1ada7","inverse-on-surface":"#313030","on-primary-container":"#3e2c26",
          "on-surface-variant":"#d4c3bf","surface-container-lowest":"#0e0e0e",
          "surface-container-highest":"#353534","surface-container-low":"#1c1b1b",
          "tertiary":"#cfc4c0","error":"#ffb4ab","surface-bright":"#393939","on-tertiary":"#352f2d"
        },
        fontFamily:{"headline":["Manrope"],"body":["Manrope"],"label":["Manrope"]},
        borderRadius:{"DEFAULT":"0.5rem","lg":"0.75rem","xl":"1.5rem","full":"9999px"},
      },
    },
  }
</script>
<style>
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
  body{background-color:#131313;color:#E5E2E1;font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased;}
  @keyframes slide-up-fade{0%{opacity:0;transform:translateY(8px);}15%{opacity:1;transform:translateY(0);}80%{opacity:1;}100%{opacity:0;transform:translateY(-4px);}}
  .toast-anim{animation:slide-up-fade 2.6s ease forwards;}
  .coffee-card{transition:all 0.15s ease;}
  .coffee-card:active{transform:scale(0.98);}
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-24">

<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#131313]/90 backdrop-blur-md">
  <div class="flex items-center justify-between w-full">
    <a href="index.html" class="p-2 hover:bg-white/5 rounded-full transition-colors">
      <span class="material-symbols-outlined text-primary text-2xl">arrow_back</span>
    </a>
    <h1 class="text-2xl font-extrabold tracking-tighter text-primary leading-none absolute left-1/2 -translate-x-1/2">ritual</h1>
    <button class="p-2 hover:bg-white/5 rounded-full transition-colors">
      <span class="material-symbols-outlined text-primary text-2xl">settings</span>
    </button>
  </div>
</header>

<main class="px-6 max-w-2xl mx-auto pt-24 pb-10">
  <div class="mb-8">
    <h2 class="text-3xl font-extrabold tracking-tighter text-primary lowercase">currently brewing</h2>
    <p class="text-[11px] uppercase tracking-widest text-outline font-bold mt-1">Select a coffee from your inventory</p>
  </div>

  <div id="coffee-list" class="flex flex-col gap-3">
    <p class="text-outline text-xs text-center py-8 uppercase tracking-widest font-bold">Loading...</p>
  </div>

  <!-- Empty state add button -->
  <div id="empty-add" class="hidden pt-6">
    <a href="edit-bean.html" class="w-full border border-primary/30 text-primary py-3 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-[0.98] hover:bg-primary/10 text-xs font-extrabold uppercase tracking-widest">
      <span class="material-symbols-outlined text-sm">add_circle</span>
      Add your first coffee
    </a>
  </div>
</main>

<div id="toast" class="fixed bottom-28 left-1/2 -translate-x-1/2 hidden px-5 py-2.5 bg-surface-container-high rounded-full text-[11px] font-extrabold uppercase tracking-widest text-primary text-center whitespace-nowrap z-50"></div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 pb-5 pt-3 bg-[#131313]/95 backdrop-blur-2xl border-t border-outline-variant/10">
  <a class="flex items-center justify-center text-on-surface opacity-40 px-4 py-2 hover:opacity-100 transition-all active:scale-95" href="index.html">
    <span class="text-[10px] uppercase tracking-widest font-extrabold">Tracker</span>
  </a>
  <a class="flex items-center justify-center text-on-surface opacity-40 px-4 py-2 hover:opacity-100 transition-all active:scale-95" href="shot-history.html">
    <span class="text-[10px] uppercase tracking-widest font-extrabold">History</span>
  </a>
  <a class="flex items-center justify-center text-on-surface opacity-40 px-4 py-2 transition-all" href="#">
    <span class="text-[10px] uppercase tracking-widest font-extrabold">Inventory</span>
  </a>
  <a class="flex items-center justify-center text-on-surface opacity-40 px-4 py-2 hover:opacity-100 transition-all active:scale-95" href="#">
    <span class="text-[10px] uppercase tracking-widest font-extrabold">Brew</span>
  </a>
</nav>

<script>
  const SUPABASE_URL='https://pblsuaypnzvbdjbnqghv.supabase.co';
  const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBibHN1YXlwbnp2YmRqYm5xZ2h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MDg4NTIsImV4cCI6MjA5MDE4NDg1Mn0.qrHP35jRU5uMmGiHgfxqRjmo7Mg_5aA430Te2rDDGbM';
  const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

  async function loadCoffees(){
    const container=document.getElementById('coffee-list');
    const{data:beans,error}=await db.from('beans').select('*').order('created_at',{ascending:false});

    if(error){
      console.error(error);
      container.innerHTML='<p class="text-outline text-xs text-center py-8 uppercase tracking-widest font-bold">Could not load coffees</p>';
      return;
    }

    if(!beans||beans.length===0){
      container.innerHTML='<p class="text-outline text-xs text-center py-8 uppercase tracking-widest font-bold">No coffees in your inventory yet</p>';
      document.getElementById('empty-add').classList.remove('hidden');
      return;
    }

    // Get current bean id so we can show which is active
    const{data:currentBean}=await db.from('current_bean').select('bean_id').eq('id',1).single();
    const currentId=currentBean?.bean_id||null;

    container.innerHTML=beans.map(bean=>{
      const isActive=bean.id===currentId;
      const detail=[];
      if(bean.roast_level)detail.push(bean.roast_level);
      if(bean.process)detail.push(bean.process);
      if(bean.region)detail.push(bean.region);

      // Shots left calc
      const shotsLeft=bean.bag_weight?Math.floor(bean.bag_weight/20):null;

      return `
        <div class="coffee-card cursor-pointer bg-surface-container-low rounded-xl p-5 border ${isActive?'border-primary/40 bg-surface-container':'border-outline-variant/5'} hover:bg-surface-container transition-colors"
          onclick="selectCoffee('${bean.id}','${escapeStr(bean.name)}','${escapeStr(bean.process||'')}','${escapeStr(bean.roast_level||'')}',${bean.bag_weight||null})">
          <div class="flex items-center justify-between">
            <div class="space-y-1 flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="text-base font-extrabold text-on-surface tracking-tight">${bean.name}</span>
                ${isActive?'<span class="px-2 py-0.5 bg-primary/15 text-primary text-[8px] font-extrabold rounded uppercase tracking-widest">Current</span>':''}
              </div>
              ${detail.length>0?`<p class="text-[11px] text-outline font-medium">${detail.join(' • ')}</p>`:''}
              ${shotsLeft!==null?`<p class="text-[10px] text-outline/60 font-bold uppercase tracking-wider">${shotsLeft} shots approx</p>`:''}
            </div>
            <span class="material-symbols-outlined text-outline/30 ml-3 text-xl">chevron_right</span>
          </div>
        </div>`;
    }).join('');
  }

  function escapeStr(s){
    return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
  }

  async function selectCoffee(beanId, name, process, roastLevel, bagWeight){
    // Update current_bean row with the selected bean's details + reference id
    const update={
      id:1,
      name,
      process:process||null,
      roast_level:roastLevel||null,
      bag_weight:bagWeight||null,
      bean_id:beanId,
      updated_at:new Date().toISOString()
    };
    const{error}=await db.from('current_bean').upsert(update);
    if(error){console.error(error);showToast('Could not update — try again');return;}
    // Go straight back to tracker
    window.location.href='index.html';
  }

  function showToast(msg){
    const t=document.getElementById('toast');t.textContent=msg;
    t.classList.remove('hidden','toast-anim');void t.offsetWidth;t.classList.add('toast-anim');
    setTimeout(()=>t.classList.add('hidden'),2700);
  }

  loadCoffees();
</script>
</body>
</html>
